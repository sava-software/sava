name: Release Please

on:
  workflow_run:
    workflows: [ "Gradle Check" ]
    branches:
      - main
    types:
      - completed

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: sava-software/sava-build/.github/workflows/release-please.yml@main
    secrets: inherit
